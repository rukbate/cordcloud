<script>
// 密码显示切换
document.getElementById('toggle-passwd').addEventListener('click', function() {
    var input = document.getElementById('passwd');
    var icon = this.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = 'visibility';
    } else {
        input.type = 'password';
        icon.textContent = 'visibility_off';
    }
});

var deviceFingerprint = '';
var fingerprintReady = false;

(function() {
    FingerprintJS.load()
        .then(function(fp) { return fp.get(); })
        .then(function(result) {
            deviceFingerprint = result.visitorId;
            fingerprintReady = true;
        })
        .catch(function() {
            deviceFingerprint = 'fallback_' + Date.now();
            fingerprintReady = true;
        });
})();
</script>

<script>
    $(document).ready(function () {
        function login() {
            
            var loginBtn = document.getElementById("login");
            loginBtn.disabled = true;
            loginBtn.classList.add('loading');
            loginBtn.innerHTML = '登录中';

            $.ajax({
                type: "POST",
                url: location.pathname,
                dataType: "json",
                data: {
                    altcha: (function() {
                        var altchaInput = document.querySelector('input[name="altcha"]');
                        return altchaInput ? altchaInput.value : '';
                    })(),
                    code: document.getElementById('code') ? $$getValue('code') : '',
                    email: $$getValue('email'),
                    passwd: $$getValue('passwd'),
                    remember_me: $("#remember_me:checked").val(),
                    csrf_token: document.querySelector('input[name="csrf_token"]').value,
                    device_fingerprint: deviceFingerprint
                },
                success: function(data) {
                    if (data.ret == 1) {
                        $("#result").modal();
                        $$.getElementById('msg').innerHTML = data.msg;
                        window.setTimeout("location.href='" + (data.redirect || '/user') + "'", 500);
                    } else if (data.ret == 2 && data.need_device_2fa) {
                        $("#result").modal();
                        $$.getElementById('msg').innerHTML = data.msg;
                        window.setTimeout("location.href='" + (data.redirect || '/auth/login/2fa?token=' + data.token) + "'", 500);
                    } else {
                        $("#result").modal();
                        $$.getElementById('msg').innerHTML = data.msg;
                        resetLoginBtn();
                                                                                                                        var altchaWidget = document.querySelector('altcha-widget');
                        if (altchaWidget) {
                            altchaWidget.reset();
                        }
                                            }
                },
                error: function(jqXHR) {
                    $("#result").modal();
                    $$.getElementById('msg').innerHTML = '发生错误：' + jqXHR.status;
                    resetLoginBtn();
                                                                                                    var altchaWidget = document.querySelector('altcha-widget');
                    if (altchaWidget) {
                        altchaWidget.reset();
                    }
                                    }
            });
        }

        function resetLoginBtn() {
            var loginBtn = document.getElementById("login");
            loginBtn.disabled = false;
            loginBtn.classList.remove('loading');
            loginBtn.innerHTML = '登 录';
        }

        $("html").keydown(function (event) {
            if (event.keyCode == 13) {
                login();
            }
        });

        $("#login").click(function () {
            login();
        });

        $('div.modal').on('shown.bs.modal', function () {
            $("div.gt_slider_knob").hide();
        });

        $('div.modal').on('hidden.bs.modal', function () {
            $("div.gt_slider_knob").show();
        });
    })
</script>

<script>
$(document).ready(function() {
    if (typeof WebAuthnUtils !== 'undefined' && WebAuthnUtils.isSupported()) {
        document.getElementById('passkey-login-btn').style.display = '';

        document.getElementById('passkey-login-btn').addEventListener('click', async function() {
            var btn = this;
            btn.disabled = true;

            try {
                var email = document.getElementById('email').value.trim();

                var optionsResp = await $.ajax({
                    type: 'POST',
                    url: '/auth/passkey/login/options',
                    dataType: 'json',
                    data: { email: email }
                });

                if (optionsResp.ret !== 1) {
                    throw new Error(optionsResp.msg || '获取登录选项失败');
                }

                var credential = await WebAuthnUtils.login(optionsResp.options);

                var verifyResp = await $.ajax({
                    type: 'POST',
                    url: '/auth/passkey/login/verify',
                    dataType: 'json',
                    contentType: 'application/json',
                    data: JSON.stringify({
                        credential: credential,
                        remember_me: document.getElementById('remember_me').checked ? 'week' : '',
                        device_fingerprint: deviceFingerprint
                    })
                });

                if (verifyResp.ret === 1) {
                    $("#result").modal();
                    document.getElementById('msg').innerHTML = verifyResp.msg || '登录成功';
                    setTimeout(function() {
                        location.href = verifyResp.redirect || '/user';
                    }, 500);
                } else {
                    throw new Error(verifyResp.msg || 'Passkey 验证失败');
                }
            } catch (error) {
                $("#result").modal();
                document.getElementById('msg').innerHTML = error.message || 'Passkey 登录失败';
                btn.disabled = false;
            }
        });
    }
});
</script>
